################################
# ruoyi-gateway
################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-gateway
  namespace: ruoyi-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-gateway
  template:
    metadata:
      labels:
        app: ruoyi-gateway
    spec:
      initContainers:
        - name: wait-for-nacos
          image: busybox:1.35
          command:
            - sh
            - -c
            - until nc -z ruoyi-nacos 8848; do echo "waiting for nacos..."; sleep 3; done
      containers:
        - name: ruoyi-gateway
          # 替换为你实际推送到 Harbor 的镜像地址
          image: 192.168.255.140:80/ruoyi-cloud/ruoyi-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # 覆盖 Nacos 地址（解决 localhost 硬编码问题）
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: "ruoyi-nacos:8848"
            - name: SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR
              value: "ruoyi-nacos:8848"
            - name: SPRING_REDIS_HOST
              value: "ruoyi-redis"
            - name: SPRING_REDIS_PORT
              value: "6379"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: ruoyi-gateway
  namespace: ruoyi-cloud
spec:
  selector:
    app: ruoyi-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

---
