apiVersion: v1
kind: ConfigMap
metadata:
  name: ruoyi-nginx-conf
  namespace: ruoyi-cloud
data:
  nginx.conf: |
    # 将原 ./nginx/conf/nginx.conf 内容粘贴到此处
    # 注意：upstream proxy_pass 中的 ruoyi-gateway
    # 在 K8s 内使用 Service DNS：http://ruoyi-gateway:8080
    worker_processes  1;
    events {
        worker_connections  1024;
    }
    http {
        include       mime.types;
        default_type  application/octet-stream;
        sendfile        on;
        keepalive_timeout  65;
        server {
            listen       80;
            server_name  localhost;
            location / {
                root   /home/ruoyi/projects/ruoyi-ui;
                try_files $uri $uri/ /index.html;
                index  index.html index.htm;
            }
            location /prod-api/ {
                proxy_set_header Host $http_host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header REMOTE-HOST $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                # K8s 内通过 Service 名访问 Gateway
                proxy_pass http://ruoyi-gateway:8080/;
            }
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-nginx
  namespace: ruoyi-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-nginx
  template:
    metadata:
      labels:
        app: ruoyi-nginx
    spec:
      initContainers:
        - name: wait-for-gateway
          image: busybox:1.35
          command:
            - sh
            - -c
            - until nc -z ruoyi-gateway 8080; do echo "waiting for gateway..."; sleep 3; done
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-ui
              mountPath: /home/ruoyi/projects/ruoyi-ui
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: nginx-conf
          configMap:
            name: ruoyi-nginx-conf
        # 前端静态文件：生产环境建议打包进 Nginx 镜像，或使用 InitContainer 从对象存储拉取
        # 临时方案：使用 emptyDir 并由 InitContainer 填充，或挂载 NFS PVC
        - name: nginx-ui
          emptyDir: {}

---
# NodePort Service：集群外访问入口
apiVersion: v1
kind: Service
metadata:
  name: ruoyi-nginx
  namespace: ruoyi-cloud
spec:
  selector:
    app: ruoyi-nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080   # 可通过 http://<Node_IP>:30080 访问
  type: NodePort

---
# （可选）Ingress：如果集群已安装 nginx-ingress-controller，
# 用 Ingress 替代 NodePort 是更优雅的生产方案
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ruoyi-ingress
  namespace: ruoyi-cloud
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: ruoyi.example.com   # 替换为实际域名
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ruoyi-nginx
                port:
                  number: 80
