apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-nginx
  namespace: ruoyi-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-nginx
  template:
    metadata:
      labels:
        app: ruoyi-nginx
    spec:
      initContainers:
        - name: wait-for-gateway
          image: busybox:1.35
          command:
            - sh
            - -c
            - until nc -z ruoyi-gateway 8080; do echo "waiting for gateway..."; sleep 3; done
      containers:
        - name: nginx
          # 使用项目自带 Dockerfile 构建的镜像（已包含 dist + nginx.conf）
          image: 192.168.255.140:80/ruoyi/nginx:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5

---
# NodePort Service：集群外访问入口
apiVersion: v1
kind: Service
metadata:
  name: ruoyi-nginx
  namespace: ruoyi-cloud
spec:
  selector:
    app: ruoyi-nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080   # 可通过 http://<Node_IP>:30080 访问
  type: NodePort

---
# （可选）Ingress：如果集群已安装 nginx-ingress-controller
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ruoyi-ingress
  namespace: ruoyi-cloud
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: ruoyi.example.com   # 替换为实际域名
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ruoyi-nginx
                port:
                  number: 80