apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-gateway
  namespace: ruoyi
  labels:
    app: ruoyi-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-gateway
  template:
    metadata:
      labels:
        app: ruoyi-gateway
    spec:
      initContainers:
        - name: wait-for-nacos
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z ruoyi-nacos 8848; do
                echo "Waiting for Nacos..."
                sleep 5
              done
        - name: wait-for-redis
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z ruoyi-redis 6379; do
                echo "Waiting for Redis..."
                sleep 3
              done
      containers:
        - name: ruoyi-gateway
          # ⚠️ 替换为你的实际镜像地址，例如：
          # harbor.example.com/ruoyi/ruoyi-gateway:latest
          image: ruoyi/ruoyi-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # 覆盖 Nacos 地址（解决 localhost 硬编码问题）
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: "ruoyi-nacos:8848"
            - name: SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR
              value: "ruoyi-nacos:8848"
            - name: SPRING_REDIS_HOST
              value: "ruoyi-redis"
            - name: SPRING_REDIS_PORT
              value: "6379"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ruoyi-gateway
  namespace: ruoyi
  labels:
    app: ruoyi-gateway
spec:
  type: ClusterIP
  selector:
    app: ruoyi-gateway
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
