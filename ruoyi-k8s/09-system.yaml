apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-modules-system
  namespace: ruoyi
  labels:
    app: ruoyi-modules-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-modules-system
  template:
    metadata:
      labels:
        app: ruoyi-modules-system
    spec:
      initContainers:
        - name: wait-for-nacos
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z ruoyi-nacos 8848; do
                echo "Waiting for Nacos..."
                sleep 5
              done
        - name: wait-for-mysql
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z ruoyi-mysql 3306; do
                echo "Waiting for MySQL..."
                sleep 3
              done
        - name: wait-for-redis
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z ruoyi-redis 6379; do
                echo "Waiting for Redis..."
                sleep 3
              done
      containers:
        - name: ruoyi-modules-system
          # ⚠️ 替换为你的实际镜像地址
          image: ruoyi/ruoyi-modules-system:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9201
          env:
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: "ruoyi-nacos:8848"
            - name: SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR
              value: "ruoyi-nacos:8848"
            - name: SPRING_REDIS_HOST
              value: "ruoyi-redis"
            - name: SPRING_REDIS_PORT
              value: "6379"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9201
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9201
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ruoyi-modules-system
  namespace: ruoyi
  labels:
    app: ruoyi-modules-system
spec:
  type: ClusterIP
  selector:
    app: ruoyi-modules-system
  ports:
    - port: 9201
      targetPort: 9201
      protocol: TCP
