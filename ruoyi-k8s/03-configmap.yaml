# ─────────────────────────────────────────────
# MySQL my.cnf (挂载到 /etc/mysql/conf.d/)
# ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: ruoyi
data:
  my.cnf: |
    [mysqld]
    innodb_buffer_pool_size = 80M
    character-set-server    = utf8mb4
    collation-server        = utf8mb4_unicode_ci
    default-time-zone       = +8:00
    lower_case_table_names  = 1
---
# ─────────────────────────────────────────────
# Redis redis.conf
# ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: ruoyi
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode no
    appendonly yes
    appendfilename "appendonly.aof"
    dir /data
---
# ─────────────────────────────────────────────
# Nacos application.properties
# ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nacos-config
  namespace: ruoyi
data:
  application.properties: |
    # ── 数据源（单机模式使用嵌入式 Derby，生产建议切换 MySQL）──
    spring.datasource.platform=mysql
    db.num=1
    db.url.0=jdbc:mysql://ruoyi-mysql:3306/nacos?characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=UTC
    db.user=root
    db.password=password

    # ── 鉴权 ──
    nacos.core.auth.enabled=true
    nacos.core.auth.system.type=nacos
    nacos.core.auth.plugin.nacos.token.secret.key=${NACOS_AUTH_TOKEN}
    nacos.core.auth.server.identity.key=${NACOS_IDENTITY_KEY}
    nacos.core.auth.server.identity.value=${NACOS_IDENTITY_VALUE}
---
# ─────────────────────────────────────────────
# Nginx nginx.conf（主配置）
# ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-main-config
  namespace: ruoyi
data:
  nginx.conf: |
    worker_processes  1;
    events {
        worker_connections  1024;
    }
    http {
        include       mime.types;
        default_type  application/octet-stream;
        sendfile        on;
        keepalive_timeout  65;
        include /etc/nginx/conf.d/*.conf;
    }
---
# ─────────────────────────────────────────────
# Nginx 虚拟主机（conf.d/ruoyi.conf）
# ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-vhost-config
  namespace: ruoyi
data:
  ruoyi.conf: |
    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /home/ruoyi/projects/ruoyi-ui;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        location /prod-api/ {
            proxy_pass         http://ruoyi-gateway:8080/;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        }
    }
