apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-nacos
  namespace: ruoyi
  labels:
    app: ruoyi-nacos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-nacos
  template:
    metadata:
      labels:
        app: ruoyi-nacos
    spec:
      # 等待 MySQL 就绪再启动 Nacos
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z ruoyi-mysql 3306; do
                echo "Waiting for MySQL..."
                sleep 3
              done
      containers:
        - name: nacos
          image: nacos/nacos-server:v3.0.2
          ports:
            - containerPort: 8848
              name: http
            - containerPort: 9848
              name: grpc
            - containerPort: 9849
              name: grpc-server
          env:
            - name: MODE
              value: "standalone"
            - name: NACOS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ruoyi-secret
                  key: nacos-auth-token
            - name: NACOS_AUTH_IDENTITY_KEY
              valueFrom:
                secretKeyRef:
                  name: ruoyi-secret
                  key: nacos-identity-key
            - name: NACOS_AUTH_IDENTITY_VALUE
              valueFrom:
                secretKeyRef:
                  name: ruoyi-secret
                  key: nacos-identity-value
          volumeMounts:
            - name: nacos-logs
              mountPath: /home/nacos/logs
            - name: nacos-conf
              mountPath: /home/nacos/conf/application.properties
              subPath: application.properties
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /nacos/actuator/health
              port: 8848
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /nacos/actuator/health
              port: 8848
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: nacos-logs
          persistentVolumeClaim:
            claimName: nacos-logs-pvc
        - name: nacos-conf
          configMap:
            name: nacos-config
---
apiVersion: v1
kind: Service
metadata:
  name: ruoyi-nacos
  namespace: ruoyi
  labels:
    app: ruoyi-nacos
spec:
  type: ClusterIP
  selector:
    app: ruoyi-nacos
  ports:
    - name: http
      port: 8848
      targetPort: 8848
    - name: grpc
      port: 9848
      targetPort: 9848
    - name: grpc-server
      port: 9849
      targetPort: 9849
---
# Nacos 控制台 NodePort（可选，用于外部访问调试）
apiVersion: v1
kind: Service
metadata:
  name: ruoyi-nacos-nodeport
  namespace: ruoyi
  labels:
    app: ruoyi-nacos
spec:
  type: NodePort
  selector:
    app: ruoyi-nacos
  ports:
    - name: http
      port: 8848
      targetPort: 8848
      nodePort: 30848
