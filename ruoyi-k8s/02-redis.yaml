apiVersion: v1
kind: ConfigMap
metadata:
  name: ruoyi-redis-conf
  namespace: ruoyi-cloud
data:
  redis.conf: |
    # requirepass 123456

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ruoyi-redis-data
  namespace: ruoyi-cloud
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: nfs-client  # 按需启用

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-redis
  namespace: ruoyi-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-redis
  template:
    metadata:
      labels:
        app: ruoyi-redis
    spec:
      containers:
        - name: redis
          image: redis:latest
          command: ["redis-server", "/home/ruoyi/redis/redis.conf"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-conf
              mountPath: /home/ruoyi/redis
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: redis-conf
          configMap:
            name: ruoyi-redis-conf
            items:
              - key: redis.conf
                path: redis.conf
        - name: redis-data
          persistentVolumeClaim:
            claimName: ruoyi-redis-data

---
apiVersion: v1
kind: Service
metadata:
  name: ruoyi-redis
  namespace: ruoyi-cloud
spec:
  selector:
    app: ruoyi-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
